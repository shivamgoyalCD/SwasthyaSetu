server:
  port: 8087

spring:
  application:
    name: prescription-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:swasthyasetu}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:Shivam@123}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    table: prescription_flyway_history
    locations: classpath:db/migration/prescription

security:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-please-32bytes}
    ttl: ${JWT_ACCESS_TTL:PT15M}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket: ${MINIO_BUCKET:swasthyasetu}

chat-service:
  base-url: ${CHAT_SERVICE_BASE_URL:http://chat-service:8084}
