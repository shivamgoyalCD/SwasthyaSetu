server:
  port: 8086

spring:
  application:
    name: rtc-signaling-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

security:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-please-32bytes}
    ttl: ${JWT_ACCESS_TTL:PT15M}

translation-service:
  base-url: ${TRANSLATION_SERVICE_BASE_URL:http://translation-service:8085}
