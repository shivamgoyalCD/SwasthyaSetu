server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/v1/users/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}
        - id: appointment-service
          uri: http://appointment-service:8083
          predicates:
            - Path=/api/v1/appointments/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}
        - id: chat-service
          uri: http://chat-service:8084
          predicates:
            - Path=/api/v1/chat/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}
        - id: translation-service
          uri: http://translation-service:8085
          predicates:
            - Path=/api/v1/translate/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}
        - id: rtc-signaling-service
          uri: http://rtc-signaling-service:8086
          predicates:
            - Path=/api/v1/rtc/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}
        - id: prescription-service
          uri: http://prescription-service:8087
          predicates:
            - Path=/api/v1/prescriptions/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}
        - id: notification-service
          uri: http://notification-service:8088
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}
        - id: chat-websocket
          uri: ws://chat-service:8084
          predicates:
            - Path=/ws/chat
        - id: rtc-websocket
          uri: ws://rtc-signaling-service:8086
          predicates:
            - Path=/ws/rtc

security:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-please-32bytes}
    ttl: ${JWT_ACCESS_TTL:PT1H}
