server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/users/**

security:
  jwt:
    secret: local-dev-secret-change-me-please-32bytes
    ttl: PT1H
