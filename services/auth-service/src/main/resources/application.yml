server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:swasthyasetu}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:Shivam@123}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    table: auth_flyway_history
    locations: classpath:db/migration/auth

security:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-please-32bytes}
    access-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-ttl: ${JWT_REFRESH_TTL:P7D}
