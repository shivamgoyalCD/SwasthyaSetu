name: swasthyasetu

x-postgres-env: &postgres-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

x-redis-env: &redis-env
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}

x-minio-env: &minio-env
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ROOT_USER: ${MINIO_ROOT_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
  MINIO_BUCKET: ${MINIO_BUCKET}

x-jwt-env: &jwt-env
  JWT_SECRET: ${JWT_SECRET}
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT}:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "${KAFKA_PORT}:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET};
      /usr/bin/mc anonymous set private local/${MINIO_BUCKET};
      "

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: [*postgres-env, *redis-env, *jwt-env]
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: [*postgres-env, *jwt-env, *minio-env]

  appointment-service:
    build:
      context: ..
      dockerfile: services/appointment-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: [*postgres-env, *redis-env, *jwt-env]

  translation-service:
    build:
      context: ..
      dockerfile: services/translation-service/Dockerfile
    restart: unless-stopped

  chat-service:
    build:
      context: ..
      dockerfile: services/chat-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      translation-service:
        condition: service_started
    environment:
      <<: [*postgres-env, *jwt-env, *minio-env]
      TRANSLATION_SERVICE_BASE_URL: http://translation-service:8085

  rtc-signaling-service:
    build:
      context: ..
      dockerfile: services/rtc-signaling-service/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      translation-service:
        condition: service_started
    environment:
      <<: [*redis-env, *jwt-env]
      TRANSLATION_SERVICE_BASE_URL: http://translation-service:8085

  prescription-service:
    build:
      context: ..
      dockerfile: services/prescription-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      chat-service:
        condition: service_started
    environment:
      <<: [*postgres-env, *jwt-env, *minio-env]
      CHAT_SERVICE_BASE_URL: http://chat-service:8084

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *postgres-env

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      - auth-service
      - user-service
      - appointment-service
      - chat-service
      - translation-service
      - rtc-signaling-service
      - prescription-service
      - notification-service
    environment:
      <<: *jwt-env
    ports:
      - "${API_GATEWAY_PORT}:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:${API_GATEWAY_PORT}/api/v1
        VITE_WS_URL: http://localhost:${API_GATEWAY_PORT}/ws
        VITE_STUN_SERVER: ${VITE_STUN_SERVER}
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  minio_data:
